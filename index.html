<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>IRC FESTIVAL 2026 - Ultra Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #020202; --glass: rgba(255, 255, 255, 0.03); --accent: #ffd700; }
        * { box-sizing: border-box; margin:0; padding:0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; perspective: 1000px; width: 100%; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        header { padding: 50px 20px; text-align: center; position: relative; }
        header h1 { font-size: clamp(1.5rem, 8vw, 3.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: clamp(2px, 2vw, 8px); background: linear-gradient(90deg, #fff, var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 3s infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 5px var(--gold)); } to { filter: drop-shadow(0 0 20px var(--gold)); } }
        nav { display: flex; justify-content: center; gap: 10px; background: rgba(0,0,0,0.8); padding: 15px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--gold); overflow-x: auto; white-space: nowrap; }
        nav button { background: none; border: 1px solid #444; color: #fff; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: clamp(0.6rem, 2vw, 0.8rem); text-transform: uppercase; flex-shrink: 0; }
        nav button.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; padding-bottom: 100px; }
        .page { display: none; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(212, 175, 55, 0.2); padding: clamp(15px, 4vw, 30px); border-radius: 25px; margin-bottom: 25px; backdrop-filter: blur(20px); }
        .countdown-container { text-align: center; margin-bottom: 40px; }
        .timer-box { display: inline-flex; gap: 10px; background: rgba(212, 175, 55, 0.1); padding: 15px clamp(20px, 5vw, 40px); border-radius: 100px; border: 1px solid var(--gold); }
        .timer-unit { font-size: clamp(0.9rem, 4vw, 1.5rem); font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        .map-canvas { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        @media (min-width: 768px) { .map-canvas { aspect-ratio: 16/10; } }
        .map-road { position: absolute; background: #151515; }
        .road-v { width: 12%; height: 100%; left: 65%; }
        .road-h { height: 10%; width: 100%; bottom: 20%; }
        .zone { position: absolute; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(0.5rem, 1.5vw, 0.7rem); color: #fff; text-align: center; }
        .z-stage { top: 10%; left: 60%; width: 25%; height: 15%; background: #E67E22; box-shadow: 0 0 20px #E67E22; }
        .z-sport { top: 10%; left: 5%; width: 45%; height: 30%; background: #2E5A6E; box-shadow: 0 0 20px #2E5A6E; }
        .z-food { top: 25%; left: 82%; width: 12%; height: 35%; background: #F1C40F; color: #000; writing-mode: vertical-rl; }
        .z-parking { bottom: 5%; left: 5%; width: 55%; height: 12%; background: #333; border: 2px dashed #555; }
        #ticketUI { display: none; background: #fff; color: #000; padding: clamp(20px, 5vw, 50px); border: clamp(8px, 2vw, 15px) double #000; text-align: center; max-width: 500px; margin: 0 auto; }
        .news-ticker { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; padding: 10px 0; font-weight: 900; font-size: clamp(0.6rem, 2vw, 0.75rem); z-index: 2000; overflow: hidden; }
        .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1px solid #444; color: white; border-radius: 12px; }
        .btn-gold { width: 100%; padding: 18px; background: linear-gradient(90deg, #D4AF37, #f1c40f, #D4AF37); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; min-width: 500px; text-align: left; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        .verify-img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid var(--gold); vertical-align: middle; margin-right: 10px; }
        .status-badge { display: flex; align-items: center; gap: 5px; color: #27ae60; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<header><h1>IRC FESTIVAL 2026</h1></header>

<nav id="mainNav">
    <button onclick="showPage('map-page')" class="nav-btn active">Live Map</button>
    <button onclick="showPage('results-page')" class="nav-btn">Standings</button>
    <button onclick="showPage('reg-page')" class="nav-btn">Book Now</button>
    <button onclick="showPage('ticket-page')" class="nav-btn">My Ticket</button>
    <button onclick="showPage('admin-login')" class="nav-btn">Admin</button>
</nav>

<div class="container">
    <div id="map-page" class="page active">
        <div class="countdown-container"><div class="timer-box"><div id="timer" class="timer-unit">00d : 00h : 00m : 00s</div></div></div>
        <div class="card" style="padding: 10px;">
            <div class="map-canvas">
                <div class="map-road road-v"></div><div class="map-road road-h"></div>
                <div class="zone z-stage">GRAND STAGE</div><div class="zone z-sport">SPORTS ARENA</div><div class="zone z-food">FOOD</div><div class="zone z-parking">PARKING</div>
            </div>
        </div>
    </div>

    <div id="results-page" class="page"><div class="card"><h2>Live Scores</h2><div id="scoreList"></div></div></div>

    <div id="reg-page" class="page">
        <div class="card">
            <h2>Registration</h2>
            <form id="bookingForm">
                <input type="text" id="uName" placeholder="Full Name" required>
                <input type="tel" id="uPhone" placeholder="Mobile Number" required>
                <select id="uAct" required></select>
                <button type="submit" class="btn-gold">Confirm Booking</button>
            </form>
        </div>
    </div>

    <div id="ticket-page" class="page">
        <div class="card" id="searchArea">
            <h2>My Tickets</h2>
            <input type="tel" id="checkPhone" placeholder="Phone Number">
            <button onclick="checkMyTicket()" class="btn-gold">View Passes</button>
        </div>
        <div id="ticketUI"></div>
    </div>

    <div id="admin-login" class="page">
        <div class="card" style="max-width:400px; margin:50px auto; text-align:center;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Security Key">
            <button onclick="tryLogin()" class="btn-gold">Login</button>
        </div>
    </div>

    <div id="admin-dash" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Master Dashboard</h2>
            <button onclick="location.reload()" style="background:#ff4757; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Logout</button>
        </div>
        
        <div class="card">
            <h3>News Ticker</h3>
            <input type="text" id="tickerInput" placeholder="Update news text...">
            <button onclick="updateTickerText()" class="btn-gold" style="padding:10px;">Save Update</button>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-bottom:20px;">
            <div class="card">
                <h3>Events</h3>
                <input type="text" id="newEv" placeholder="Event Name">
                <button onclick="addEvent()" class="btn-gold" style="padding:10px;">Add</button>
                <div id="adminActsList" style="margin-top:10px;"></div>
            </div>
            <div class="card">
                <h3>Scores</h3>
                <input type="text" id="mIn" placeholder="Match"><input type="text" id="sIn" placeholder="Result">
                <button onclick="addScore()" class="btn-gold" style="padding:10px;">Update</button>
                <div id="adminScoresList" style="margin-top:10px;"></div>
            </div>
        </div>

        <div class="card">
            <h3>Verifications</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr style="color:var(--gold);"><th>Participant</th><th>Phone</th><th>Status / Photo</th></tr></thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="news-ticker"><div id="tickerContent" class="ticker-content"></div></div>

<script>
    // 1. إعداد Firebase الخاص بك
    const firebaseConfig = {
      apiKey: "AIzaSyBLfk_aNRZ1h0UoRJMUwUqriB_Mptbggh8",
      authDomain: "irc-festival.firebaseapp.com",
      projectId: "irc-festival",
      storageBucket: "irc-festival.firebasestorage.app",
      messagingSenderId: "555006599378",
      appId: "1:555006599378:web:fab2722adf6fdaa0bd4d0b",
      measurementId: "G-G0WG1FTHLJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let acts = [], scores = [], users = [], tickerText = "";

    // 2. مزامنة البيانات من Firebase فوراً عند أي تغيير
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        acts = data.acts || ["FIFA 26 Elite", "Cyber Gaming"];
        scores = data.scores || [];
        users = data.users || [];
        tickerText = data.ticker || "🏆 IRC FESTIVAL 2026: THE BIGGEST TECH EVENT IS COMING 🏆";
        refreshUI();
    });

    function sync() {
        db.ref('/').set({ acts, scores, users, ticker: tickerText });
    }

    function refreshUI() {
        document.getElementById('tickerContent').innerText = tickerText;
        document.getElementById('uAct').innerHTML = acts.map(a => `<option value="${a}">${a}</option>`).join('');
        
        if(document.getElementById('adminActsList')) {
            document.getElementById('adminActsList').innerHTML = acts.map((a, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">${a} <button onclick="deleteEvent(${i})" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`).join('');
        }
        
        document.getElementById('scoreList').innerHTML = scores.map(s => `<div style="padding:15px; background:rgba(255,255,255,0.05); margin-bottom:10px; border-radius:15px; border-left:5px solid var(--gold); display:flex; justify-content:space-between;"><span>${s.m}</span><b style="color:var(--gold)">${s.v}</b></div>`).join('');
        
        if(document.getElementById('adminScoresList')) {
            document.getElementById('adminScoresList').innerHTML = scores.map((s, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:rgba(255,255,255,0.05); padding:5px; border-radius:5px;"><span>${s.m}: ${s.v}</span><button onclick="deleteScore(${i})" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`).join('');
        }

        document.getElementById('userTable').innerHTML = users.map((u, i) => `
            <tr>
                <td>${u.n}</td>
                <td>${u.p}</td>
                <td>
                    ${u.v ? `<div class="status-badge"><img src="${u.img}" class="verify-img"> ✅ Verified</div>` : `<button onclick="verifyParticipant(${i})" class="btn-gold" style="padding:5px 12px; font-size:0.7rem; width:auto;">VERIFY</button>`}
                </td>
            </tr>`).join('');
    }

    // --- الدوال الأساسية للأدمن والمستخدم ---
    function addScore() {
        const m = document.getElementById('mIn').value, v = document.getElementById('sIn').value;
        if(m && v) { scores.unshift({m, v}); sync(); document.getElementById('mIn').value = ""; document.getElementById('sIn').value = ""; }
    }
    function deleteScore(i) { if(confirm("Delete?")) { scores.splice(i, 1); sync(); } }
    function addEvent() { const v = document.getElementById('newEv').value; if(v) { acts.push(v); sync(); document.getElementById('newEv').value=""; } }
    function deleteEvent(i) { acts.splice(i,1); sync(); }
    function updateTickerText() { const val = document.getElementById('tickerInput').value; if(val) { tickerText = val; sync(); alert("Updated!"); } }

    function verifyParticipant(i) {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            let file = e.target.files[0];
            let reader = new FileReader();
            reader.onload = () => {
                users[i].v = true;
                users[i].img = reader.result;
                sync();
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    document.getElementById('bookingForm').onsubmit = function(e) {
        e.preventDefault();
        users.push({ n: document.getElementById('uName').value, p: document.getElementById('uPhone').value, a: document.getElementById('uAct').value, v: false });
        sync();
        alert("Success! Waiting for verification.");
        showPage('ticket-page');
    };

    function checkMyTicket() {
        const phone = document.getElementById('checkPhone').value;
        const myTickets = users.filter(u => u.p === phone && u.v);
        if(myTickets.length > 0) {
            document.getElementById('searchArea').style.display = 'none';
            const ui = document.getElementById('ticketUI');
            ui.style.display = 'block';
            ui.innerHTML = `<h1 style="border-bottom: 2px solid #000; padding-bottom: 10px;">IRC PASS</h1>`;
            myTickets.forEach(user => {
                ui.innerHTML += `<div style="margin:20px 0; border:1px dashed #000; padding:15px; text-align:left; font-weight:bold;">
                    <img src="${user.img}" style="width:100%; height:150px; object-fit:cover; margin-bottom:10px; border-radius:10px;">
                    <p style="font-size:0.8rem; color:#666;">HOLDER</p><p>${user.n}</p>
                    <p style="font-size:0.8rem; color:#666; margin-top:10px;">ACTIVITY</p><p style="color:var(--gold)">${user.a}</p>
                    <p style="margin-top:10px; color:green; text-align:center;">● VERIFIED</p></div>`;
            });
            ui.innerHTML += `<button onclick="window.print()" class="btn-gold">Download PDF</button><p onclick="location.reload()" style="margin-top:20px; color:blue; cursor:pointer;">Back</p>`;
        } else { alert("Not verified yet."); }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function tryLogin() { if(document.getElementById('adminPass').value === "1234") showPage('admin-dash'); else alert("Denied"); }

    // Particles & Countdown
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const mouse = { x: null, y: null };
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    class Particle {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2 + 1; this.baseX = this.x; this.baseY = this.y; this.density = (Math.random() * 30) + 1; }
        draw() { ctx.fillStyle = 'rgba(212, 175, 55, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        update() {
            let dx = mouse.x - this.x; let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < 100) { this.x -= dx/10; this.y -= dy/10; }
            else { if (this.x !== this.baseX) this.x -= (this.x - this.baseX)/20; if (this.y !== this.baseY) this.y -= (this.y - this.baseY)/20; }
        }
    }
    function initC() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = []; for (let i = 0; i < 80; i++) particles.push(new Particle()); }
    function animC() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.draw(); p.update(); }); requestAnimationFrame(animC); }
    initC(); animC(); window.addEventListener('resize', initC);

    window.onload = () => {
        const target = new Date("May 8, 2026 00:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("timer").innerHTML = `${d}d : ${h}h : ${m}m : ${s}s`;
        }, 1000);
    };
</script>
</body>
</html>
